<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable | Occitanie Protection Foudre</title>
  <meta name="description" content="La page demandée n'existe pas. Retournez à l'accueil d'Occitanie Protection Foudre ou contactez-nous.">
  <meta name="robots" content="noindex, follow">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

  <style>
    /* --- Custom Properties --- */
    :root {
      --bg-deep: #121820;
      --bg-card: #1A2030;
      --accent: #E8A817;
      --accent-hover: #D4960A;
      --accent-glow: rgba(232, 168, 23, 0.12);
      --text-primary: #E8E6E1;
      --text-body: #B8B8B8;
      --text-muted: #6B7280;
      --border: #2A3344;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'Plus Jakarta Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius-md: 8px;
    }

    /* --- Reset --- */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: var(--font-body);
      font-size: 1rem;
      line-height: 1.7;
      color: var(--text-body);
      background: var(--bg-deep);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    img, svg {
      display: block;
      max-width: 100%;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* --- Page Layout --- */
    .error-page {
      text-align: center;
      max-width: 540px;
      width: 100%;
    }

    /* --- Logo --- */
    .error-page__logo {
      display: inline-block;
      margin-bottom: 2.5rem;
    }

    .error-page__logo img {
      height: 50px;
      width: auto;
      border-radius: 6px;
    }

    /* --- 404 Number Block --- */
    .error-page__code-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .error-page__code {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(6rem, 20vw, 10rem);
      line-height: 1;
      color: var(--accent);
      letter-spacing: -0.04em;
      position: relative;
      z-index: 1;
    }

    /* Glow behind the number */
    .error-page__code::after {
      content: '404';
      position: absolute;
      inset: 0;
      font-family: inherit;
      font-weight: inherit;
      font-size: inherit;
      line-height: inherit;
      letter-spacing: inherit;
      color: transparent;
      filter: blur(40px);
      background: transparent;
      -webkit-text-stroke: 0;
      text-shadow: 0 0 80px rgba(232, 168, 23, 0.3);
      z-index: -1;
    }

    /* --- Lightning Bolt SVG --- */
    .error-page__bolt {
      position: absolute;
      right: -2rem;
      top: -0.5rem;
      width: 44px;
      height: 44px;
      color: var(--accent);
      opacity: 0.7;
      z-index: 2;
      animation: bolt-pulse 3s ease-in-out infinite;
    }

    @keyframes bolt-pulse {
      0%, 100% { opacity: 0.7; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(-3px); }
    }

    /* --- Text --- */
    .error-page__title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(1.5rem, 4vw, 2rem);
      line-height: 1.2;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
    }

    .error-page__desc {
      font-size: 1.0625rem;
      color: var(--text-body);
      line-height: 1.7;
      margin-bottom: 2.25rem;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
    }

    /* --- Buttons --- */
    .error-page__actions {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 2.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      min-height: 44px;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.9375rem;
      line-height: 1;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 200ms cubic-bezier(0.22, 1, 0.36, 1);
      white-space: nowrap;
    }

    .btn--primary {
      background: var(--accent);
      color: #0A0A0A;
    }

    .btn--primary:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
    }

    .btn--outline {
      border: 1px solid var(--border);
      color: var(--text-primary);
      background: transparent;
    }

    .btn--outline:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-glow);
      transform: translateY(-2px);
    }

    /* --- Phone --- */
    .error-page__phone {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-weight: 500;
      font-size: 1.0625rem;
      color: var(--accent);
      transition: opacity 200ms ease;
    }

    .error-page__phone:hover {
      opacity: 0.8;
    }

    .error-page__phone svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* --- Divider --- */
    .error-page__divider {
      width: 48px;
      height: 1px;
      background: var(--border);
      margin: 0 auto 1.25rem;
    }

    /* --- Reduced Motion --- */
    @media (prefers-reduced-motion: reduce) {
      .error-page__bolt {
        animation: none;
        opacity: 0.7;
      }

      .btn {
        transition: none;
      }

      .error-page__phone {
        transition: none;
      }

      .error-page__code::after {
        text-shadow: none;
      }
    }

    /* --- Responsive --- */
    @media (max-width: 480px) {
      body {
        padding: 1.5rem 1rem;
      }

      .error-page__bolt {
        width: 32px;
        height: 32px;
        right: -1.25rem;
        top: -0.25rem;
      }

      .error-page__actions {
        flex-direction: column;
        align-items: stretch;
      }

      .btn {
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <main class="error-page" role="main">

    <!-- Logo -->
    <a href="index.html" class="error-page__logo" aria-label="Occitanie Protection Foudre — Accueil">
      <img src="images/logos/logo-opf.jpg" alt="Occitanie Protection Foudre" width="83" height="50">
    </a>

    <!-- 404 Number + Lightning Bolt -->
    <div class="error-page__code-wrap">
      <span class="error-page__code" aria-hidden="true">404</span>
      <svg class="error-page__bolt" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M13 2L4.09 12.63C3.74 13.05 3.56 13.26 3.56 13.44C3.56 13.59 3.63 13.74 3.75 13.83C3.89 13.94 4.17 13.94 4.72 13.94H12L11 22L19.91 11.37C20.26 10.95 20.44 10.74 20.44 10.56C20.44 10.41 20.37 10.26 20.25 10.17C20.11 10.06 19.83 10.06 19.28 10.06H12L13 2Z" fill="currentColor" opacity="0.15"/>
        <path d="M13 2L4.09 12.63C3.74 13.05 3.56 13.26 3.56 13.44C3.56 13.59 3.63 13.74 3.75 13.83C3.89 13.94 4.17 13.94 4.72 13.94H12L11 22L19.91 11.37C20.26 10.95 20.44 10.74 20.44 10.56C20.44 10.41 20.37 10.26 20.25 10.17C20.11 10.06 19.83 10.06 19.28 10.06H12L13 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- Heading -->
    <h1 class="error-page__title">Page introuvable</h1>

    <!-- Description -->
    <p class="error-page__desc">
      La page que vous cherchez n'existe pas ou a&nbsp;été&nbsp;déplacée.
    </p>

    <!-- CTAs -->
    <div class="error-page__actions">
      <a href="index.html" class="btn btn--primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Retour à l'accueil
      </a>
      <a href="contact.html" class="btn btn--outline">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Nous contacter
      </a>
    </div>

    <!-- Divider + Phone -->
    <div class="error-page__divider"></div>
    <a href="tel:+33755619344" class="error-page__phone" aria-label="Appeler le 07 55 61 93 44">

      07 55 61 93 44
    </a>

  </main>

</body>
</html>
