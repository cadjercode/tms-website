<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Réglage Hero — TMS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #111; color: #fff; }

    .hero-preview {
      position: relative;
      width: 100%;
      height: 60vh;
      overflow: hidden;
    }

    .hero-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 55% 24%;
    }

    .hero-preview .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .hero-preview .text-demo {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2;
      text-align: center;
      padding: 2rem;
    }

    .hero-preview .text-demo h1 {
      font-size: clamp(1.5rem, 4vw, 2.8rem);
      font-weight: 700;
      color: #fff;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
      margin-bottom: 0.5rem;
    }

    .hero-preview .text-demo p {
      font-size: clamp(0.9rem, 2vw, 1.2rem);
      color: rgba(255,255,255,0.9);
      max-width: 600px;
    }

    .controls {
      padding: 1.5rem 2rem;
      background: #1a1a1a;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .control-group {
      background: #222;
      border-radius: 12px;
      padding: 1rem 1.2rem;
    }

    .control-group h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
      margin-bottom: 0.75rem;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .slider-row label {
      flex: 0 0 100px;
      font-size: 0.85rem;
    }

    .slider-row input[type="range"] {
      flex: 1;
      accent-color: #2D7D46;
      height: 6px;
    }

    .slider-row .value {
      flex: 0 0 55px;
      text-align: right;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      color: #2D7D46;
    }

    .output-section {
      padding: 1.5rem 2rem;
      background: #111;
    }

    .output-section h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
      margin-bottom: 0.75rem;
    }

    .css-output {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1rem;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      color: #e0e0e0;
      white-space: pre-wrap;
      line-height: 1.6;
    }

    .css-output .prop { color: #9cdcfe; }
    .css-output .val { color: #ce9178; }

    .btn-row {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }

    .btn {
      padding: 0.6rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn--copy {
      background: #2D7D46;
      color: #fff;
    }
    .btn--copy:hover { background: #1B5E30; }

    .btn--reset {
      background: #333;
      color: #ccc;
    }
    .btn--reset:hover { background: #444; }

    .copied {
      color: #2D7D46;
      font-size: 0.85rem;
      margin-left: 1rem;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .copied.show { opacity: 1; }
  </style>
</head>
<body>

  <div class="hero-preview">
    <img id="heroImg" src="images/hero-chantier-pelle.jpg" alt="Hero TMS">
    <div class="overlay" id="overlay"></div>
    <div class="text-demo">
      <h1>Terrassement dans le Tarn — on transforme votre terrain.</h1>
      <p>Terrassement, VRD, aménagement extérieur, défrichement — votre spécialiste travaux publics à Labruguière, dans le Tarn.</p>
    </div>
  </div>

  <div class="controls">
    <div class="control-group">
      <h3>Image</h3>
      <div class="slider-row">
        <label>Luminosité</label>
        <input type="range" id="brightness" min="50" max="200" value="100" step="5">
        <span class="value" id="brightness-val">100%</span>
      </div>
      <div class="slider-row">
        <label>Contraste</label>
        <input type="range" id="contrast" min="50" max="200" value="100" step="5">
        <span class="value" id="contrast-val">100%</span>
      </div>
      <div class="slider-row">
        <label>Saturation</label>
        <input type="range" id="saturate" min="0" max="200" value="100" step="5">
        <span class="value" id="saturate-val">100%</span>
      </div>
    </div>

    <div class="control-group">
      <h3>Overlay (voile sombre)</h3>
      <div class="slider-row">
        <label>Gauche</label>
        <input type="range" id="ov-left" min="0" max="100" value="70" step="5">
        <span class="value" id="ov-left-val">0.70</span>
      </div>
      <div class="slider-row">
        <label>Centre</label>
        <input type="range" id="ov-mid" min="0" max="100" value="40" step="5">
        <span class="value" id="ov-mid-val">0.40</span>
      </div>
      <div class="slider-row">
        <label>Droite</label>
        <input type="range" id="ov-right" min="0" max="100" value="15" step="5">
        <span class="value" id="ov-right-val">0.15</span>
      </div>
      <div class="slider-row">
        <label>Bas</label>
        <input type="range" id="ov-bottom" min="0" max="100" value="60" step="5">
        <span class="value" id="ov-bottom-val">0.60</span>
      </div>
    </div>
  </div>

  <div class="output-section">
    <h3>CSS à appliquer</h3>
    <div class="css-output" id="cssOutput"></div>
    <div class="btn-row">
      <button class="btn btn--copy" onclick="copyCSS()">Copier le CSS</button>
      <button class="btn btn--reset" onclick="resetAll()">Réinitialiser</button>
      <span class="copied" id="copiedMsg">Copié !</span>
    </div>
  </div>

  <script>
    var img = document.getElementById('heroImg');
    var overlay = document.getElementById('overlay');
    var output = document.getElementById('cssOutput');

    var sliders = {
      brightness: document.getElementById('brightness'),
      contrast: document.getElementById('contrast'),
      saturate: document.getElementById('saturate'),
      ovLeft: document.getElementById('ov-left'),
      ovMid: document.getElementById('ov-mid'),
      ovRight: document.getElementById('ov-right'),
      ovBottom: document.getElementById('ov-bottom')
    };

    var defaults = {
      brightness: 100, contrast: 100, saturate: 100,
      ovLeft: 70, ovMid: 40, ovRight: 15, ovBottom: 60
    };

    function update() {
      var b = sliders.brightness.value;
      var c = sliders.contrast.value;
      var s = sliders.saturate.value;

      img.style.filter = 'brightness(' + b + '%) contrast(' + c + '%) saturate(' + s + '%)';

      document.getElementById('brightness-val').textContent = b + '%';
      document.getElementById('contrast-val').textContent = c + '%';
      document.getElementById('saturate-val').textContent = s + '%';

      var ol = (sliders.ovLeft.value / 100).toFixed(2);
      var om = (sliders.ovMid.value / 100).toFixed(2);
      var or2 = (sliders.ovRight.value / 100).toFixed(2);
      var ob = (sliders.ovBottom.value / 100).toFixed(2);

      document.getElementById('ov-left-val').textContent = ol;
      document.getElementById('ov-mid-val').textContent = om;
      document.getElementById('ov-right-val').textContent = or2;
      document.getElementById('ov-bottom-val').textContent = ob;

      overlay.style.background =
        'linear-gradient(135deg, rgba(27,42,61,' + ol + ') 0%, rgba(27,42,61,' + om + ') 50%, rgba(27,42,61,' + or2 + ') 100%), ' +
        'linear-gradient(to top, rgba(27,42,61,' + ob + ') 0%, transparent 40%)';

      var filterCSS = '';
      if (b != 100 || c != 100 || s != 100) {
        var parts = [];
        if (b != 100) parts.push('brightness(' + b + '%)');
        if (c != 100) parts.push('contrast(' + c + '%)');
        if (s != 100) parts.push('saturate(' + s + '%)');
        filterCSS = 'filter: ' + parts.join(' ') + ';';
      }

      output.innerHTML =
        '<span class="prop">.hero__bg img</span> {\n' +
        (filterCSS ? '  ' + filterCSS + '\n' : '') +
        '}\n\n' +
        '<span class="prop">.hero__overlay</span> {\n' +
        '  background:\n' +
        '    linear-gradient(\n' +
        '      135deg,\n' +
        '      rgba(27,42,61,<span class="val">' + ol + '</span>) 0%,\n' +
        '      rgba(27,42,61,<span class="val">' + om + '</span>) 50%,\n' +
        '      rgba(27,42,61,<span class="val">' + or2 + '</span>) 100%\n' +
        '    ),\n' +
        '    linear-gradient(\n' +
        '      to top,\n' +
        '      rgba(27,42,61,<span class="val">' + ob + '</span>) 0%,\n' +
        '      transparent 40%\n' +
        '    );\n' +
        '}';
    }

    Object.values(sliders).forEach(function(s) {
      s.addEventListener('input', update);
    });

    function resetAll() {
      sliders.brightness.value = defaults.brightness;
      sliders.contrast.value = defaults.contrast;
      sliders.saturate.value = defaults.saturate;
      sliders.ovLeft.value = defaults.ovLeft;
      sliders.ovMid.value = defaults.ovMid;
      sliders.ovRight.value = defaults.ovRight;
      sliders.ovBottom.value = defaults.ovBottom;
      update();
    }

    function copyCSS() {
      var text = output.textContent;
      navigator.clipboard.writeText(text).then(function() {
        var msg = document.getElementById('copiedMsg');
        msg.classList.add('show');
        setTimeout(function() { msg.classList.remove('show'); }, 2000);
      });
    }

    update();
  </script>
</body>
</html>
